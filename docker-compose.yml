version: '3.9'

services:
  app:
    build: .
    container_name: anpr_app
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - REDIS_HOST=redis
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - anpr_network

  postgres:
    image: postgres:16-alpine
    container_name: anpr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-anpr_db}
      POSTGRES_USER: ${DB_USER:-anpr_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-yourStrongPassword}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-anpr_user} -d ${DB_NAME:-anpr_db}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - anpr_network

  redis:
    image: redis:7-alpine
    container_name: anpr_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - anpr_network

volumes:
  postgres_data:
  redis_data:

networks:
  anpr_network:
    driver: bridge
